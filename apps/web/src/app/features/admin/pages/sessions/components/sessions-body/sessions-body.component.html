<section
  class="sessions-body sessions-body--list"
  [class.sessions-body--with-selection]="selectedCount() > 0"
>
  <div class="sessions-body__list">
    <app-session-list
      [sessions]="sessions()"
      [loading]="loading()"
      [selectedIds]="selectedIds()"
      (selectedIdsChange)="selectedIdsChange.emit($event)"
      (contextMenuRequested)="contextMenuRequested.emit($event)"
    />
  </div>

  <app-session-batch
    [selectedCount]="selectedCount()"
    (clearSelection)="clearSelection.emit()"
    (openBatchSheet)="openBatchSheet.emit($event)"
  />

  @if (total() > pageSize()) {
    <p-paginator
      class="sessions-body__paginator"
      [rows]="pageSize()"
      [totalRecords]="total()"
      [first]="(currentPage() - 1) * pageSize()"
      (onPageChange)="pageChange.emit(($event.page ?? 0) + 1)"
    />
  }
</section>
