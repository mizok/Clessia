<form [formGroup]="form" (ngSubmit)="submit()" class="cal-op-form">
  <div class="cal-op-form__field">
    <label for="substituteTeacher" class="cal-op-form__label">
      代課老師<span class="cal-op-form__required">*</span>
    </label>
    <p-select
      id="substituteTeacher"
      formControlName="teacherId"
      [options]="teachers()"
      optionLabel="displayName"
      optionValue="id"
      placeholder="選擇代課老師"
      styleClass="w-full"
      appendTo="body"
      [filter]="true"
      filterBy="displayName"
      [loading]="loadingTeachers()"
    >
      <ng-template #option let-t>
        <div class="flex items-center gap-2">
          <span>{{ t.displayName }}</span>
        </div>
      </ng-template>
    </p-select>
    @if (!loadingTeachers() && teachers().length === 0) {
      <p class="cal-op-form__hint">目前沒有符合該課堂分校與科目的代課老師。</p>
    }
  </div>
  <div class="cal-op-form__field">
    <label for="substituteReason" class="cal-op-form__label">代課原因（選填）</label>
    <textarea
      id="substituteReason"
      pTextarea
      formControlName="reason"
      placeholder="例如：原老師請假..."
      class="cal-op-form__textarea"
    ></textarea>
  </div>
  <div class="cal-op-form__footer">
    <p-button label="取消" severity="secondary" [text]="true" (onClick)="closeDialog()" />
    <p-button
      label="確認代課"
      severity="primary"
      type="submit"
      [disabled]="form.invalid"
      [loading]="isSubmitting()"
    />
  </div>
</form>
